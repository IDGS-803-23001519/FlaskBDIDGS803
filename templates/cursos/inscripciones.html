{% extends "layout.html" %}
{% block container %}

<div class="max-w-4xl mx-auto">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Gestionar Inscripciones
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Formulario de Inscripción -->
        <div class="bg-white shadow-lg rounded-lg p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Inscribir Alumno</h3>
            
            <form action="{{ url_for('cursos.inscripciones') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <input type="hidden" name="accion" value="inscribir">
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Seleccionar Curso</label>
                    <select name="curso_id" required 
                            class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-brand focus:border-brand">
                        <option value="">-- Seleccione un curso --</option>
                        {% for curso in cursos %}
                        <option value="{{ curso.id }}">{{ curso.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Seleccionar Alumno</label>
                    <select name="alumno_id" required 
                            class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-brand focus:border-brand">
                        <option value="">-- Seleccione un alumno --</option>
                        {% for alumno in alumnos %}
                        <option value="{{ alumno.id }}">{{ alumno.nombre }} {{ alumno.apellidos }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <button type="submit"
                    class="text-white bg-brand box-border border border-transparent 
                       hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium 
                       shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 
                       focus:outline-none">
                    Inscribir Alumno
                </button>
            </form>
        </div>

        <!-- Formulario para eliminar inscripción -->
        <div class="bg-white shadow-lg rounded-lg p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Eliminar Inscripción</h3>
            
            <form action="{{ url_for('cursos.inscripciones') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <input type="hidden" name="accion" value="eliminar">
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Seleccionar Curso</label>
                    <select name="curso_id" required 
                            class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-brand focus:border-brand">
                        <option value="">-- Seleccione un curso --</option>
                        {% for curso in cursos %}
                        <option value="{{ curso.id }}">{{ curso.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Seleccionar Alumno</label>
                    <select name="alumno_id" required 
                            class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-brand focus:border-brand">
                        <option value="">-- Seleccione un alumno --</option>
                        {% for alumno in alumnos %}
                        <option value="{{ alumno.id }}">{{ alumno.nombre }} {{ alumno.apellidos }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <button type="submit"
                    class="w-full text-white bg-danger box-border border border-transparent 
                    hover:bg-danger-strong focus:ring-4 focus:ring-danger-medium 
                    shadow-xs font-medium leading-5 rounded-full text-sm px-4 py-2.5 
                    focus:outline-none">
                    Eliminar Inscripción
                </button>
            </form>
        </div>
    </div>

    <div class="flex justify-center mt-8">
        <a href="{{ url_for('cursos.listadoCursos') }}" 
           class="inline-block text-white bg-brand box-border border border-transparent 
                hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium 
                shadow-xs font-medium leading-5 rounded-full text-sm px-6 py-2.5 
                focus:outline-none transition">
            Volver a Cursos
        </a>
    </div>
</div>

{% endblock %}
