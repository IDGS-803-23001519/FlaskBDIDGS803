{% extends "layout.html" %}
{% block container %}

<div class="min-h-screen flex items-center justify-center bg-gray-100 py-10">
    
    <div class="w-full max-w-3xl bg-white shadow-2xl rounded-2xl overflow-hidden flex">
        
        <div class="flex items-center justify-center bg-blue-600 w-1/3 p-6">
            <a href="{{ url_for('cursos.listadoCursos') }}">
                <img 
                    src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" 
                    alt="Curso"
                    class="w-22 h-24 rounded-full border-4 border-white shadow-md 
                           hover:scale-110 transition duration-300 cursor-pointer"
                >
            </a>
        </div>

        <div class="p-6">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
                Detalles del Curso
            </h2>

            <div class="space-y-4">
                

                <div class="bg-gray-50 p-4 rounded-lg">
                    <p class="text-sm text-gray-500">Nombre del Curso</p>
                    <p class="font-semibold text-gray-800 text-lg">{{ nombre }}</p>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg col-span-2">
                    <p class="text-sm text-gray-500">Descripción</p>
                    <p class="font-semibold text-gray-800">{{ descripcion }}</p>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg col-span-2">
                    <p class="text-sm text-gray-500">Maestro</p>
                    <p class="font-semibold text-gray-800 text-lg">{{ nombreMaes }}</p>
                </div>
            </div>

            

        </div>

    </div>

</div>

{% endblock %}
