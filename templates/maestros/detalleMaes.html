{% extends "layout.html" %} {% block container %} {% import "_macros.html" as macros %}

<div class="min-h-screen flex items-center justify-center bg-gray-100 py-10">
    
    <div class="w-full max-w-3xl bg-white shadow-2xl rounded-2xl overflow-hidden flex">
        
        <div class="flex items-center justify-center bg-blue-600 w-1/3 p-6">
            <a href="{{ url_for('maestros.listado_maestros') }}">
                <img 
                    src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" 
                    alt="Maestro"
                    class="w-24 h-24 rounded-full border-4 border-white shadow-md 
                           hover:scale-110 transition duration-300 cursor-pointer"
                >
            </a>
        </div>

        <div class="p-6 w-2/3">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
                Detalles del Maestro
            </h2>

            <div class="space-y-4">
                <div class="bg-gray-50 p-3 rounded-lg">
                    <p class="text-sm text-gray-500">Matricula</p>
                    <p class="font-semibold text-gray-800">{{ matricula }}</p>
                </div>

                <div class="bg-gray-50 p-3 rounded-lg">
                    <p class="text-sm text-gray-500">Nombre</p>
                    <p class="font-semibold text-gray-800">{{ nombre }}</p>
                </div>

                <div class="bg-gray-50 p-3 rounded-lg">
                    <p class="text-sm text-gray-500">Apellidos</p>
                    <p class="font-semibold text-gray-800">{{ apellidos }}</p>
                </div>

                <div class="bg-gray-50 p-3 rounded-lg">
                    <p class="text-sm text-gray-500">Especialidad</p>
                    <p class="font-semibold text-gray-800">{{ especialidad }}</p>
                </div>

                <div class="bg-gray-50 p-3 rounded-lg">
                    <p class="text-sm text-gray-500">Email</p>
                    <p class="font-semibold text-gray-800">{{ email }}</p>
                </div>

            
            </div>

        </div>

    </div>

</div>

{% endblock %}
